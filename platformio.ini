; PlatformIO Project Configuration File — NanoClaw Watch
;
; LilyGo T-Watch S3 firmware. Uses LilyGoLib (official LilyGo HAL),
; LVGL 9.x for UI, ArduinoJson for response parsing.
;
; The pioarduino fork of platform-espressif32 is required because LilyGoLib
; needs arduino-esp32 >= 3.3.0, which the upstream PlatformIO platform
; (espressif32) does not yet ship. The board definition is custom — see
; boards/twatch-s3.json — because pioarduino doesn't ship a T-Watch-S3 board
; yet, even though the framework variant exists.

[env:twatch-s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = twatch-s3
framework = arduino

upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
monitor_speed = 115200

; LilyGoLib hard-codes USING_FATFS and requires a partition labeled 'ffat'.
; The stock default_16MB.csv ships SPIFFS instead, which makes setupMSC() hang
; in an infinite retry loop. Override with our own table that matches
; LilyGoLib/examples/factory/partitions.csv.
board_build.partitions = partitions.csv

lib_deps =
    bblanchon/ArduinoJson@^6.21.0
    xinyuan-lilygo/LilyGoLib@^0.1.0
    mikalhart/TinyGPSPlus@^1.0.3

build_flags =
    -DCORE_DEBUG_LEVEL=3
    ; T-Watch S3 capability flags. These are defined in the lilygo_twatch_s3
    ; Arduino variant's pins_arduino.h, but PlatformIO's library build process
    ; doesn't reliably propagate variant defines into library .cpp files (seen
    ; empirically: instance.mic compiled fine but LV_Helper_v9.cpp's touch
    ; input registration was compiled with USING_INPUT_DEV_TOUCHPAD undefined,
    ; leaving LVGL with no touch input device and buttons totally unresponsive).
    ; Defining them globally here guarantees every compilation unit sees them.
    -DUSING_INPUT_DEV_TOUCHPAD
    -DUSING_PDM_MICROPHONE
    -DUSING_PCM_AMPLIFIER
    -DUSING_PMU_MANAGE
    -DUSING_IR_REMOTE
    ; Edge Impulse wake-word model (lib/Jorgenclaw-project-1_inferencing).
    ; Dynamic allocation so the tensor arena lands on the heap (which can
    ; spill into PSRAM), not the DRAM BSS — otherwise we overflow by ~25 KB.
    ; Override the EON-compiled model file's local default of 10 overflow
    ; buffer slots — too small for this model, causes a StoreProhibited
    ; panic on the first inference ("Failed to allocate persistent buffer
    ; of size 576, does not fit in tensor arena and reached
    ; EI_MAX_OVERFLOW_BUFFER_COUNT"). 50 gives comfortable headroom.
    -DEI_MAX_OVERFLOW_BUFFER_COUNT=50
